<!DOCTYPE html>
<html>

<head>

<title>Hospital Search - MedLink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
padding:40px
}

h1{
margin-bottom:20px
}

.card{
background:#0f172a;
padding:25px;
border-radius:10px;
margin-bottom:20px
}

button{
padding:10px 20px;
background:#ef4444;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px
}

button:hover{
background:#dc2626
}

</style>

</head>

<body>

<h1 id="pageTitle">Hospitals</h1>

<div id="hospitalContainer"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const API="http://localhost:5000/api"

const token=localStorage.getItem("token")

const params = new URLSearchParams(window.location.search)

const hospitalId = params.get("id")
const city = params.get("city")

const socket = io("http://localhost:5000")

/* ============================
   LOAD HOSPITALS BY CITY
============================ */

async function loadHospitalsByCity(){

document.getElementById("pageTitle").innerText="Hospitals in " + city

const res = await fetch(API+"/hospitals/search?name="+city,{
headers:{Authorization:"Bearer "+token}
})

const hospitals = await res.json()

let html=""

if(hospitals.length===0){

html="<p>No hospitals found</p>"

}else{

hospitals.forEach(h=>{

html+=`

<div class="card">

<h2>${h.name}</h2>

<p>City: ${h.city}</p>
<p>ICU Beds: ${h.icuBeds}</p>
<p>Doctors: ${h.doctors}</p>
<p>Ambulances: ${h.ambulances}</p>

<button onclick="openHospital('${h._id}')">
View Details
</button>

</div>

`

})

}

document.getElementById("hospitalContainer").innerHTML=html

}

/* ============================
   LOAD SINGLE HOSPITAL
============================ */

async function loadHospital(){

const res = await fetch(API+"/hospitals/"+hospitalId,{
headers:{Authorization:"Bearer "+token}
})

const hospital = await res.json()

let html = `

<div class="card">

<h1>${hospital.name}</h1>

<p>City: ${hospital.city}</p>
<p>Contact: ${hospital.contact || "N/A"}</p>
<p>Email: ${hospital.email || "N/A"}</p>

</div>

<div class="card">

<h3>Resources</h3>

<p>ICU Beds: <span id="icuBeds">${hospital.icuBeds}</span></p>
<p>Doctors: <span id="doctorCount">${hospital.doctors}</span></p>
<p>Ambulances: <span id="ambulanceCount">${hospital.ambulances}</span></p>

</div>

<div class="card">

<h3>Doctors</h3>

<div id="doctorList"></div>

</div>

<div class="card">

<h3>Emergency</h3>

<button onclick="requestICU()">Request ICU</button>

<button onclick="sendSOS()">Emergency SOS</button>

</div>

`

document.getElementById("hospitalContainer").innerHTML=html

loadDoctors()

}

/* ============================
   LOAD DOCTORS
============================ */

async function loadDoctors(){

const res = await fetch(API+"/hospitals/"+hospitalId+"/doctors",{
headers:{Authorization:"Bearer "+token}
})

const doctors = await res.json()

let html=""

doctors.forEach(d=>{

html+=`
<p>${d.name} - ${d.specialization} (${d.availability})</p>
`

})

document.getElementById("doctorList").innerHTML=html

}

/* ============================
   REDIRECT TO DETAILS
============================ */

function openHospital(id){

window.location.href="hospital-search.html?id="+id

}

/* ============================
   ICU REQUEST
============================ */

async function requestICU(){

navigator.geolocation.getCurrentPosition(async position=>{

await fetch(API+"/emergency/request",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
lat:position.coords.latitude,
lng:position.coords.longitude,
type:"ICU"
})

})

alert("ICU request sent")

})

}

/* ============================
   EMERGENCY SOS
============================ */

async function sendSOS(){

navigator.geolocation.getCurrentPosition(async position=>{

await fetch(API+"/emergency/request",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
lat:position.coords.latitude,
lng:position.coords.longitude,
type:"EMERGENCY"
})

})

alert("Emergency request sent")

})

}

/* ============================
   REALTIME RESOURCE UPDATE
============================ */

socket.on("hospitalResourceUpdate",(data)=>{

if(data._id === hospitalId){

document.getElementById("icuBeds").innerText=data.icuBeds
document.getElementById("doctorCount").innerText=data.doctors
document.getElementById("ambulanceCount").innerText=data.ambulances

}

})

/* ============================
   PAGE LOAD LOGIC
============================ */

if(city){

loadHospitalsByCity()

}else if(hospitalId){

loadHospital()

}

</script>

</body>

</html>

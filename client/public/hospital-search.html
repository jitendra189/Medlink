<!DOCTYPE html>
<html>

<head>

<title>Hospital Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
padding:40px
}

.card{
background:#0f172a;
padding:25px;
border-radius:10px;
margin-bottom:20px
}

button{
padding:10px 20px;
background:#ef4444;
border:none;
color:white;
border-radius:6px;
cursor:pointer
}

</style>

</head>

<body>

<h1 id="hospitalName"></h1>

<div class="card">

<p id="hospitalCity"></p>
<p id="hospitalContact"></p>
<p id="hospitalEmail"></p>

</div>


<div class="card">

<h3>Resources</h3>

<p>ICU Beds: <span id="icuBeds"></span></p>
<p>Doctors: <span id="doctorCount"></span></p>
<p>Ambulances: <span id="ambulanceCount"></span></p>

</div>


<div class="card">

<h3>Doctors</h3>

<div id="doctorList"></div>

</div>


<div class="card">

<h3>Emergency</h3>

<button onclick="requestICU()">Request ICU</button>

<button onclick="sendSOS()">Emergency SOS</button>

</div>


<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const API="http://localhost:5000/api"

const token=localStorage.getItem("token")

const params = new URLSearchParams(window.location.search)

const hospitalId = params.get("id")

const socket = io("http://localhost:5000")

/* ======================
   LOAD HOSPITAL DETAILS
====================== */

async function loadHospital(){

const res = await fetch(API+"/hospitals/"+hospitalId,{
headers:{Authorization:"Bearer "+token}
})

const hospital = await res.json()

document.getElementById("hospitalName").innerText=hospital.name
document.getElementById("hospitalCity").innerText="City: "+hospital.city
document.getElementById("hospitalContact").innerText="Contact: "+(hospital.contact || "N/A")
document.getElementById("hospitalEmail").innerText="Email: "+(hospital.email || "N/A")

}

/* ======================
   LOAD RESOURCES
====================== */

async function loadResources(){

const res = await fetch(API+"/hospitals/"+hospitalId+"/resources",{
headers:{Authorization:"Bearer "+token}
})

const data = await res.json()

document.getElementById("icuBeds").innerText=data.icuBeds
document.getElementById("doctorCount").innerText=data.doctors
document.getElementById("ambulanceCount").innerText=data.ambulances

}

/* ======================
   LOAD DOCTORS
====================== */

async function loadDoctors(){

const res = await fetch(API+"/hospitals/"+hospitalId+"/doctors",{
headers:{Authorization:"Bearer "+token}
})

const doctors = await res.json()

let html=""

doctors.forEach(d=>{

html+=`
<p>
${d.name} - ${d.specialization} (${d.availability})
</p>
`

})

document.getElementById("doctorList").innerHTML=html

}

/* ======================
   EMERGENCY REQUEST
====================== */

async function requestICU(){

navigator.geolocation.getCurrentPosition(async position=>{

await fetch(API+"/emergency/request",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
lat:position.coords.latitude,
lng:position.coords.longitude,
type:"ICU"
})

})

alert("ICU request sent")

})

}

/* ======================
   SOS
====================== */

async function sendSOS(){

navigator.geolocation.getCurrentPosition(async position=>{

await fetch(API+"/emergency/request",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
lat:position.coords.latitude,
lng:position.coords.longitude,
type:"EMERGENCY"
})

})

alert("Emergency request sent")

})

}

/* ======================
   SOCKET LIVE UPDATE
====================== */

socket.on("hospitalResourceUpdate",(data)=>{

if(data._id === hospitalId){

document.getElementById("icuBeds").innerText=data.icuBeds
document.getElementById("doctorCount").innerText=data.doctors
document.getElementById("ambulanceCount").innerText=data.ambulances

}

})


loadHospital()
loadResources()
loadDoctors()

</script>

</body>

</html>

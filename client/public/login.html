<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedLink Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
overflow:hidden;
}

/* container */

.container{

width:420px;
padding:40px;
background:rgba(255,255,255,0.08);
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.15);
color:white;

}

.container:hover{
box-shadow:0 0 20px #2563eb;
}

h2{
margin-bottom:20px;
text-align:center;
font-weight:600;
}

/* role tabs */

.roles{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.role-btn{

flex:1;
padding:8px;
border:none;
background:transparent;
color:#cbd5f5;
cursor:pointer;
border-bottom:2px solid transparent;

}

.role-btn.active{
color:#60a5fa;
border-bottom:2px solid #60a5fa;
}

/* inputs */

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:transparent;
color:white;

}

input::placeholder{
color:#cbd5f5;
}

/* button */

button.login-btn{

width:100%;
padding:12px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
font-weight:500;
cursor:pointer;
margin-top:10px;
transition:0.3s;

}

button.login-btn:hover{
box-shadow:0 0 15px #2563eb;
}

/* error */

.error{

color:#f87171;
font-size:13px;
margin-top:10px;
text-align:center;

}

/* register link */

.register-link{
margin-top:20px;
text-align:center;
}

.register-link a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>MedLink Login</h2>

<!-- ROLE SWITCH -->

<div class="roles">

<button class="role-btn active" onclick="setRole('patient',this)">Patient</button>
<button class="role-btn" onclick="setRole('hospital',this)">Hospital</button>
<button class="role-btn" onclick="setRole('donor',this)">Donor</button>

</div>

<input id="email" placeholder="Email">

<div style="position:relative">

<input id="password" type="password" placeholder="Password">

<span id="eye"
onclick="togglePassword()"
style="position:absolute;right:12px;top:12px;cursor:pointer">
👁️
</span>

</div>
<div class="error" id="error"></div>

<button class="login-btn" onclick="login()">Login</button>

<div class="register-link">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

<script>

const API="http://localhost:5000/api"

let selectedRole="patient"

function setRole(role,btn){

selectedRole=role

document.querySelectorAll(".role-btn").forEach(b=>{
b.classList.remove("active")
})

btn.classList.add("active")

}

/* PASSWORD TOGGLE */

function togglePassword(){

const pass=document.getElementById("password")
const eye=document.getElementById("eye")

if(pass.type==="password"){
pass.type="text"
eye.innerText="🙈"
}else{
pass.type="password"
eye.innerText="👁️"
}

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value
const error=document.getElementById("error")

error.innerText=""

try{

const res=await fetch(API+"/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password,
role:selectedRole
})

})

const data=await res.json()

console.log("SERVER RESPONSE:",data)   // debugging

if(!res.ok){

error.innerText=data.message || "Email or password is wrong"
return

}

/* save token */

localStorage.setItem("token",data.token)

/* redirect by role */

if(data.user.role==="patient"){
window.location.href="patient-dashboard.html"
}

if(data.user.role==="hospital"){
window.location.href="../hospital-dashboard.html"
}

if(data.user.role==="donor"){
window.location.href="../donor-profile.html"
}

}catch(err){

console.log(err)
error.innerText="Server error. Try again."

}

}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find ICU Beds | MedLink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:#020617;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
color:#38bdf8;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

.search-box input{
padding:12px;
width:250px;
border-radius:6px;
border:none;
}

.search-box button{
padding:12px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.search-box button:hover{
background:#1d4ed8;
}

.hospital-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
margin-top:30px;
}

.card{
background:#0f172a;
border-radius:10px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
color:#38bdf8;
margin-bottom:6px;
}

.card-content p{
font-size:14px;
color:#cbd5f5;
}

.empty{
text-align:center;
margin-top:30px;
color:#cbd5f5;
}

</style>

</head>

<body>

<h1>Find ICU Beds Near You</h1>

<div class="search-box">

<input id="cityInput" placeholder="Enter city e.g Delhi">

<button onclick="searchCity()">Search</button>

<button onclick="detectLocation()">Detect My Location</button>

</div>

<div class="hospital-grid" id="hospitalList">

<p class="empty">Search a location to view hospitals</p>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const API="http://localhost:5000/api"
const token = localStorage.getItem("token")

const socket = io("http://localhost:5000")

/* LOAD HOSPITALS */

async function loadHospitals(city){

try{

const res = await fetch(API+"/patient/hospitals",{
headers:{
Authorization:"Bearer "+token
}
})

if(!res.ok){
throw new Error("API error")
}

const hospitals = await res.json()

let html=""

let filtered = hospitals.filter(h => h.icuBeds > 0)

if(city){
filtered = filtered.filter(h =>
h.city && h.city.toLowerCase().includes(city.toLowerCase())
)
}

filtered.forEach(h=>{

html+=`

<div class="card">

<img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3">

<div class="card-content">

<h3>${h.name}</h3>

<p>City: ${h.city || "Unknown"}</p>

<p>ICU Beds Available: ${h.icuBeds}</p>

</div>

</div>

`

})

if(html===""){
html='<p class="empty">No ICU beds available in this area</p>'
}

document.getElementById("hospitalList").innerHTML=html

}catch(err){

console.error(err)

document.getElementById("hospitalList").innerHTML=
'<p class="empty">Error loading hospitals</p>'

}

}

/* SEARCH CITY */

function searchCity(){

const city=document.getElementById("cityInput").value.trim()

if(!city){
alert("Please enter a city")
return
}

loadHospitals(city)

}

/* DETECT LOCATION */

function detectLocation(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(async position=>{

const lat=position.coords.latitude
const lng=position.coords.longitude

try{

const res=await fetch(
`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
)

const data=await res.json()

const city =
data.address.city ||
data.address.town ||
data.address.village ||
data.address.state

if(city){

document.getElementById("cityInput").value=city

loadHospitals(city)

}else{

alert("City detection failed")

}

}catch(err){

alert("Location lookup failed")

}

})

}

/* REALTIME UPDATE */

socket.on("hospitalResourceUpdate",()=>{

const city=document.getElementById("cityInput").value

if(city){
loadHospitals(city)
}

})

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Blood Donors</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#020617;
color:white;
padding:40px
}

h1{
margin-bottom:30px
}

.donor-card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:15px
}

button{
padding:10px 20px;
background:#dc2626;
border:none;
color:white;
border-radius:6px;
cursor:pointer
}

</style>

</head>

<body>

<h1>Available Blood Donors</h1>

<div id="donorList"></div>

<script>

const API="http://localhost:5000/api"
const token=localStorage.getItem("token")

/* GET BLOOD GROUP FROM URL */

const params = new URLSearchParams(window.location.search)

let bloodGroup = params.get("bloodGroup")

/* decode O%2B → O+ */

bloodGroup = decodeURIComponent(bloodGroup)

async function loadDonors(){

try{

const res = await fetch(
API+"/donors/search?bloodGroup="+encodeURIComponent(bloodGroup),
{
headers:{
Authorization:"Bearer "+token
}
})

const donors = await res.json()

console.log("Donor response:", donors)

let html=""

if(!Array.isArray(donors) || donors.length===0){

html="<p>No donors available</p>"

}else{

donors.forEach(d=>{

html+=`

<div class="donor-card">

<h3>${d.user?.name || ""}</h3>

<p>Blood Group: ${d.bloodGroup}</p>

<p>Phone: ${d.phone}</p>

<p>City: ${d.city || "Ranchi"}</p>

<a href="tel:${d.phone}">
<button>Call Donor</button>
</a>

</div>

`

})

}

document.getElementById("donorList").innerHTML=html

}catch(error){

console.log(error)

}

}

loadDonors()

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedLink Donor Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{display:flex;background:#f4f6fb}

.sidebar{
width:240px;
background:#0f172a;
color:white;
height:100vh;
padding:25px
}

.sidebar a{
display:block;
padding:12px;
margin:10px 0;
color:white;
text-decoration:none;
border-radius:8px
}

.sidebar a:hover{background:#2563eb}

.main{flex:1;padding:30px}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
margin-bottom:20px
}

.update-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.05)
}

.update-box button{
padding:10px 15px;
background:#dc2626;
border:none;
color:white;
border-radius:6px;
cursor:pointer
}

</style>
</head>

<body>

<div class="sidebar">

<h2>MedLink</h2>

<a href="#">Dashboard</a>
<a href="#">Blood Requests</a>

</div>

<div class="main">

<div class="topbar">

<h2>Blood Donor Dashboard</h2>

</div>

<div class="stat-card">

<h3 id="bloodGroup">--</h3>
<p>Your Blood Group</p>

</div>

<div class="stat-card">

<h3 id="availability">--</h3>
<p>Availability Status</p>

</div>

<div class="update-box">

<h3>Update Availability</h3>

<button onclick="updateAvailability(true)">Available</button>

<button onclick="updateAvailability(false)">Not Available</button>

</div>

</div>

<script>

const API="http://localhost:5000/api"
const token=localStorage.getItem("token")

async function loadDonor(){

const res=await fetch(API+"/donor/dashboard",{

headers:{Authorization:"Bearer "+token}

})

const data=await res.json()

document.getElementById("bloodGroup").innerText=data.bloodGroup
document.getElementById("availability").innerText=data.available?"Available":"Not Available"

}

async function updateAvailability(status){

await fetch(API+"/donor/update-availability",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
available:status
})

})

alert("Availability Updated")

loadDonor()

}

loadDonor()

</script>

</body>
</html>

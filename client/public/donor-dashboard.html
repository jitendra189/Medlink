<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedLink Blood Donor Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
display:flex;
background:#f5f5f5;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#7f1d1d,#b91c1c);
color:white;
height:100vh;
padding:25px;
}

.sidebar h2{
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:12px;
margin:12px 0;
text-decoration:none;
color:white;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#ef4444;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.profile img{
width:40px;
height:40px;
border-radius:50%;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-8px);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

/* REQUESTS */

.requests{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.request{
background:#fee2e2;
padding:12px;
border-radius:8px;
margin-top:10px;
}

/* HISTORY */

.history{
margin-top:25px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.history-item{
padding:10px 0;
border-bottom:1px solid #eee;
}

/* AVAILABILITY */

.availability{
margin-top:25px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.toggle{
margin-top:10px;
padding:12px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>MedLink Donor</h2>

<a href="#">Dashboard</a>
<a href="#">Blood Requests</a>
<a href="#">Donation History</a>
<a href="#">Profile</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h2>Blood Donor Dashboard</h2>

<div class="profile">

<img src="https://randomuser.me/api/portraits/men/32.jpg">

<p id="donorName">Donor</p>

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">
<h3 id="bloodGroup">--</h3>
<p>Your Blood Group</p>
</div>

<div class="stat-card">
<h3 id="totalDonations">0</h3>
<p>Total Donations</p>
</div>

<div class="stat-card">
<h3 id="livesImpacted">0</h3>
<p>Lives Impacted</p>
</div>

<div class="stat-card">
<h3 id="pendingRequests">0</h3>
<p>Pending Requests</p>
</div>

</div>

<!-- GRID -->

<div class="grid">

<div>

<div class="requests">

<h3>Nearby Blood Requests</h3>

<div id="requestsContainer">

<p>Loading requests...</p>

</div>

</div>

<div class="history">

<h3>Donation History</h3>

<div id="historyContainer">

<p>No history available</p>

</div>

</div>

</div>

<div>

<div class="availability">

<h3>Availability Status</h3>

<p id="availabilityText">Loading...</p>

<button class="toggle" onclick="toggleAvailability()">
Toggle Availability
</button>

</div>

</div>

</div>

</div>

<script>

const API="http://localhost:5000/api"
const token=localStorage.getItem("token")

/* LOAD DASHBOARD DATA */

async function loadDonor(){

const res=await fetch(API+"/donor/dashboard",{
headers:{Authorization:"Bearer "+token}
})

const data=await res.json()

document.getElementById("donorName").innerText=data.name
document.getElementById("bloodGroup").innerText=data.bloodGroup

document.getElementById("totalDonations").innerText=data.totalDonations || 0

document.getElementById("livesImpacted").innerText=(data.totalDonations || 0)*3

document.getElementById("availabilityText").innerText=
data.available?"You are currently available":"You are currently not available"

}

/* LOAD REQUESTS */

async function loadRequests(){

const res=await fetch(API+"/requests/nearby",{
headers:{Authorization:"Bearer "+token}
})

const requests=await res.json()

const container=document.getElementById("requestsContainer")

container.innerHTML=""

document.getElementById("pendingRequests").innerText=requests.length

requests.forEach(r=>{

container.innerHTML+=`

<div class="request">
🩸 ${r.patientName} needs ${r.bloodGroup} blood at ${r.hospital}
</div>

`

})

}

/* LOAD DONATION HISTORY */

async function loadHistory(){

const res=await fetch(API+"/donor/history",{
headers:{Authorization:"Bearer "+token}
})

const history=await res.json()

const container=document.getElementById("historyContainer")

container.innerHTML=""

history.forEach(h=>{

container.innerHTML+=`

<div class="history-item">
Donated at ${h.hospital} — ${h.date}
</div>

`

})

}

/* TOGGLE AVAILABILITY */

async function toggleAvailability(){

const res=await fetch(API+"/donor/dashboard",{
headers:{Authorization:"Bearer "+token}
})

const donor=await res.json()

await fetch(API+"/donor/update-availability",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
available:!donor.available
})

})

alert("Availability Updated")

loadDonor()

}

/* INITIAL LOAD */

loadDonor()
loadRequests()
loadHistory()

</script>

</body>

</html>
